name: phone_store
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  intl: ^0.18.0
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  flutter_login: ^5.0.0
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  image_picker: ^1.1.2
  firebase_storage: ^12.4.0
  flutter_custom_selector: ^0.0.3
  firebase_app_check: ^0.3.2+3
  collection: ^1.18.0
  shared_preferences: ^2.5.2
  google_sign_in: ^6.2.2
  email_auth: ^2.0.0
  email_otp: ^3.0.2
  mailer: ^6.4.1
  card_swiper: ^3.0.1
  uuid: ^4.5.1
  intl_phone_field: ^3.2.0
  flutter_stripe: ^9.2.0
  http: ^1.4.0
  flutter_phone_direct_caller: ^2.2.1
  firebase_messaging: ^15.2.9
  flutter_native_splash: ^2.4.4
  shimmer: ^3.0.0
  redacted: ^1.0.13  
  geocoding: ^4.0.0
  permission_handler: ^12.0.1
  geolocator: ^14.0.2 
  google_maps_flutter: ^2.10.1
  google_places_flutter: ^2.1.0
  connectivity_plus: ^6.1.4
  get: ^4.7.2
  loading_animation_widget: ^1.3.0
  googleapis_auth: ^1.6.0
  app_settings: ^6.1.1
  flutter_local_notifications: ^19.4.0

dependency_overrides: 
   geolocator_android: 4.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
flutter_launcher_icons:
  image_path: "assets/logo/dm-logo.jpg"
  android: true
  ios: false
  flutter_lints: ^4.0.0

flutter:
  assets:
    - assets/img/
    - assets/fonts/
    - assets/logo/
  uses-material-design: true

  fonts:
    - family: Sniglet
      fonts:
        - asset: assets/fonts/Sniglet/Sniglet-ExtraBold.ttf
        - asset: assets/fonts/Sniglet/Sniglet-Regular.ttf
          weight: 400

flutter_native_splash:
  android: true
  ios: true
  web: false

  background_image: "assets/logo/background.jpg"
  image: "assets/logo/logo.png"
